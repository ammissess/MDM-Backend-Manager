ktor {
  deployment {
    port = 8080
  }
  application {
    modules = [ com.example.mdmbackend.ApplicationKt.module ]
  }
}

mdm {
  auth {
    # Token "session" tạm thời (chưa dùng JWT). Mặc định 30 ngày.
    sessionTtlMinutes = 43200
  }

  seed {
    adminUser = "admin"
    adminPass = "admin123"

    # Tài khoản cố định cho thiết bị (device app) đăng nhập lấy config
    deviceUser = "device"
    devicePass = "device123"

    # ✅ thêm: password để unlock device (tạm thời dùng chung để test)
    defaultDeviceUnlockPass = "1111"

    defaultUserCode = "TEST123"
    defaultAllowedApps = ["com.android.settings", "com.android.chrome"]
  }

  db {
    # ✅ MySQL
    jdbcUrl = "jdbc:mysql://localhost:3306/mdmappbasic?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
    driver = "com.mysql.cj.jdbc.Driver"
    user = "mdm"
    password = "mdm123"
  }
}
