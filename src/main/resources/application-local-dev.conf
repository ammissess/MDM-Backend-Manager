mdm.profiles.local-dev {
  seed {
    adminUser = ${?MDM_LOCAL_ADMIN_USER}
    adminUser = "local-admin"

    adminPass = ${?MDM_LOCAL_ADMIN_PASS}
    adminPass = "local-admin-123"

    deviceUser = ${?MDM_LOCAL_DEVICE_USER}
    deviceUser = "local-device"

    devicePass = ${?MDM_LOCAL_DEVICE_PASS}
    devicePass = "local-device-123"

    defaultDeviceUnlockPass = ${?MDM_LOCAL_DEVICE_UNLOCK_PASS}
    defaultDeviceUnlockPass = "2468"

    defaultUserCode = ${?MDM_LOCAL_DEFAULT_USER_CODE}
    defaultUserCode = "LOCAL001"

    defaultAllowedApps = ["com.android.settings", "com.android.chrome"]
  }

  db {
    jdbcUrl = ${?MDM_LOCAL_DB_JDBC_URL}
    jdbcUrl = "jdbc:mysql://localhost:3306/mdmappbasic?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"

    driver = ${?MDM_LOCAL_DB_DRIVER}
    driver = "com.mysql.cj.jdbc.Driver"

    user = ${?MDM_LOCAL_DB_USER}
    user = "mdm"

    password = ${?MDM_LOCAL_DB_PASSWORD}
    password = "mdm123"
  }

  cors {
    allowedOrigins = ${?MDM_LOCAL_ALLOWED_ORIGINS}
    allowedOrigins = ["http://localhost:5173"]
  }

  rateLimit {
    login {
      enabled = true
      maxRequests = 10
      windowSeconds = 60
    }

    unlock {
      enabled = true
      maxRequests = 5
      windowSeconds = 60
    }
  }
}
