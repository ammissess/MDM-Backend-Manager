mdm.profiles.demo {
  seed {
    adminUser = ${?MDM_DEMO_ADMIN_USER}
    adminUser = "demo-admin"

    adminPass = ${?MDM_DEMO_ADMIN_PASS}

    deviceUser = ${?MDM_DEMO_DEVICE_USER}
    deviceUser = "demo-device"

    devicePass = ${?MDM_DEMO_DEVICE_PASS}
    defaultDeviceUnlockPass = ${?MDM_DEMO_DEVICE_UNLOCK_PASS}

    defaultUserCode = ${?MDM_DEMO_DEFAULT_USER_CODE}
    defaultUserCode = "DEMO001"

    defaultAllowedApps = ["com.android.settings", "com.android.chrome"]
  }

  db {
    jdbcUrl = ${?MDM_DEMO_DB_JDBC_URL}
    driver = ${?MDM_DEMO_DB_DRIVER}
    user = ${?MDM_DEMO_DB_USER}
    password = ${?MDM_DEMO_DB_PASSWORD}
  }
}
