mdm.profiles.integration-test {
  seed {
    adminUser = "admin"
    adminPass = "admin123"

    deviceUser = "device"
    devicePass = "device123"

    defaultDeviceUnlockPass = "1111"
    defaultUserCode = "TEST005"
    defaultAllowedApps = ["com.android.settings", "com.android.chrome"]
  }

  db {
    jdbcUrl = ${?MDM_TEST_DB_JDBC_URL}
    jdbcUrl = "jdbc:h2:mem:mdm_backend_integration;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"

    driver = ${?MDM_TEST_DB_DRIVER}
    driver = "org.h2.Driver"

    user = ${?MDM_TEST_DB_USER}
    user = "sa"

    password = ${?MDM_TEST_DB_PASSWORD}
    password = ""
  }

  cors {
    allowedOrigins = ["http://localhost:5173"]
  }

  rateLimit {
    login {
      enabled = true
      maxRequests = 20
      windowSeconds = 60
    }

    unlock {
      enabled = true
      maxRequests = 20
      windowSeconds = 60
    }
  }
}
