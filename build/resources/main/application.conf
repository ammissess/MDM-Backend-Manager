ktor {
  deployment {
    port = 8080
  }
  application {
    modules = [ com.example.mdmbackend.ApplicationKt.module ]
  }
}

mdm {
  auth {
    # Token "session" tạm thời (chưa dùng JWT). Mặc định 30 ngày.
    sessionTtlMinutes = 43200
  }

  seed {
    adminUser = "admin"
    adminPass = "admin123"

    # Tài khoản cố định cho thiết bị (device app) đăng nhập lấy config
    deviceUser = "device"
    devicePass = "device123"

    defaultUserCode = "TEST123"
    defaultAllowedApps = ["com.android.settings", "com.android.chrome"]
  }

  db {
    # DEV mặc định dùng H2 file (giữ dữ liệu qua restart)
    jdbcUrl = "jdbc:h2:file:./data/mdmappbasic;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    driver = "org.h2.Driver"
    user = "sa"
    password = ""
  }
}
